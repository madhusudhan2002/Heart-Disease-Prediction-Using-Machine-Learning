<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | HeartGuard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ff4d4d;
--secondary:#1a1a2e;
--accent:#4d94ff;
--bg:#0f0f1a;
--card-bg:rgba(26,26,46,0.8);
--text:#e0e0e0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:radial-gradient(circle at top right,#1a1a2e,#0f0f1a);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}

nav{
padding:2rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,15,26,0.9);
-webkit-backdrop-filter:blur(10px);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:1.8rem;
font-weight:700;
color:var(--primary);
text-transform:uppercase;
letter-spacing:2px;
text-decoration:none;
}

.auth-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:2rem;
}

.auth-card{
background:var(--card-bg);
padding:3rem;
border-radius:24px;
border:1px solid rgba(255,255,255,0.1);
width:100%;
max-width:500px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.auth-card h2{
font-size:2.5rem;
margin-bottom:2rem;
text-align:center;
background:linear-gradient(45deg,#fff,var(--primary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.form-group{
margin-bottom:1.5rem;
}

.form-group label{
display:block;
margin-bottom:0.5rem;
color:#a0a0b0;
}

.form-group input,
.form-group select{
width:100%;
padding:1rem;
border-radius:12px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:white;
font-size:1rem;
transition:0.3s;
}

.form-group select{
appearance:none;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 2px rgba(255,77,77,0.2);
}

.btn{
width:100%;
padding:1.2rem;
font-size:1.1rem;
font-weight:600;
border-radius:12px;
border:none;
cursor:pointer;
transition:all 0.4s;
margin-top:1rem;
}

.btn-primary{
background:var(--primary);
color:white;
box-shadow:0 10px 30px rgba(255,77,77,0.3);
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(255,77,77,0.5);
}

.auth-footer{
margin-top:2rem;
text-align:center;
color:#a0a0b0;
}

.auth-footer a{
color:var(--primary);
text-decoration:none;
font-weight:600;
}

.alert{
padding:1rem;
border-radius:12px;
margin-bottom:1.5rem;
text-align:center;
}

.alert-danger{
background:rgba(255,77,77,0.1);
color:#ff4d4d;
border:1px solid rgba(255,77,77,0.2);
}

.alert-success{
background:rgba(77,255,148,0.1);
color:#4dff94;
border:1px solid rgba(77,255,148,0.2);
}

</style>

</head>

<body>

<nav>
<a href="/" class="logo">HeartGuard AI</a>
</nav>

<div class="auth-container">

<div class="auth-card">

<h2>Create Account</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}

<div class="alert alert-{{ category }}">{{ message }}</div>
{% endfor %}
{% endif %}
{% endwith %}

<form action="/signup" method="POST">

<div class="form-group">
<label for="name">Full Name</label>
<input type="text" id="name" name="name" required placeholder="John Doe">
</div>

<div class="form-group">
<label for="user_type_select">I am...</label>

<select id="user_type_select" disabled title="User type">
<option selected>Patient</option>
</select>

<input type="hidden" name="user_type" value="Patient">

</div>

<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" required placeholder="john@example.com">
</div>

<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" required placeholder="••••••••">
</div>

<button type="submit" class="btn btn-primary">
Sign Up
</button>

</form>

<div class="auth-footer">
Already have an account? <a href="/login">Login</a>
</div>

</div>
</div>

</body>
</html>
