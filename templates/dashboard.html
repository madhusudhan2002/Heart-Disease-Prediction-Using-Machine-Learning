<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard | HeartGuard</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ff4d4d;
--secondary:#1a1a2e;
--accent:#00f2fe;
--bg:#0b0b14;
--card-bg:#141426;
--text:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding:2rem;
}

.dashboard-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:3rem;
}

.title-group h1{
font-size:2.2rem;
color:var(--primary);
}

.controls{
display:flex;
align-items:center;
gap:1.5rem;
background:var(--card-bg);
padding:0.8rem 1.5rem;
border-radius:50px;
border:1px solid rgba(255,255,255,0.1);
}

.switch{
position:relative;
display:inline-block;
width:50px;
height:24px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#333;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:16px;
width:16px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked+.slider{
background:var(--primary);
}

input:checked+.slider:before{
transform:translateX(26px);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:2rem;
}

.chart-card{
background:var(--card-bg);
padding:2rem;
border-radius:24px;
border:1px solid rgba(255,255,255,0.05);
min-height:450px;
}

.stats-grid{
grid-column:span 2;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:1.5rem;
margin-bottom:2rem;
}

.stat-box{
background:linear-gradient(145deg,#1e1e35,#141426);
padding:1.5rem;
border-radius:20px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

.stat-box h4{
color:#a0a0b0;
font-size:0.9rem;
text-transform:uppercase;
margin-bottom:0.5rem;
}

.stat-box div{
font-size:1.8rem;
font-weight:700;
color:var(--primary);
}

.hidden{
display:none;
}

/* ---------- IMPROVED USERS TABLE ---------- */

.users-table{
width:100%;
border-collapse:collapse;
font-size:15px;
}

.users-table thead{
color:#a0a0b0;
}

.users-table th{
padding:14px 10px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.users-table td{
padding:16px 10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.users-table tr:hover{
background:rgba(255,255,255,0.03);
transition:0.3s;
}

</style>
</head>

<body>

<div class="dashboard-header">

<div class="title-group">

<div style="display:flex;justify-content:space-between;align-items:center;">
<a href="/" style="color:var(--primary);text-decoration:none;">← Back Home</a>
<a href="/logout" style="color:#ffb3b3;text-decoration:none;margin-left:1rem;">Logout</a>
</div>

<h1>Performance Analytics & Users</h1>

</div>

<div class="controls">
<span>Model Comparison</span>

<label class="switch" for="viewToggle" aria-label="Toggle between Model Comparison and Dataset Details">
<input type="checkbox" id="viewToggle" title="Toggle between Model Comparison and Dataset Details">
<span class="slider"></span>
</label>

<span>Dataset Details</span>
</div>

</div>


<!-- PERFORMANCE VIEW -->

<div id="performanceView">

<div class="stats-grid">



<div class="stat-box">
<h4>AUC Score</h4>
<div>98%</div>
</div>

<div class="stat-box">
<h4>Baseline Accuracy</h4>
<div>75.99%</div>
</div>

</div>

<div class="grid">

<div class="chart-card">
<div id="accuracyChart"></div>
</div>

<div class="chart-card">
<div id="metricsChart"></div>
</div>

</div>

</div>


<!-- DATASET VIEW -->

<div id="datasetView" class="hidden">

<div class="stats-grid">

<div class="stat-box">
<h4>Total Samples</h4>
<div id="totalSamples">50,000</div>
</div>

<div class="stat-box">
<h4>Input Features</h4>
<div>6</div>
</div>

<div class="stat-box">
<h4>Positive Cases</h4>
<div id="posCases">---</div>
</div>

<div class="stat-box">
<h4>Negative Cases</h4>
<div id="negCases">---</div>
</div>

</div>

<div class="grid">

<div class="chart-card" style="grid-column:span 2;">
<div id="distChart"></div>
</div>

</div>

</div>


<script>


function initCharts(){


Plotly.newPlot('metricsChart',metricsChartData,{
title:'Sensitivity & AUC Score',
barmode:'group',
paper_bgcolor:'rgba(0,0,0,0)',
plot_bgcolor:'rgba(0,0,0,0)',
font:{color:'#fff'},
yaxis:{range:[0,100]}
});

}

document.getElementById('viewToggle').addEventListener('change',(e)=>{

const perfView=document.getElementById('performanceView');
const dataView=document.getElementById('datasetView');

if(e.target.checked){
perfView.classList.add('hidden');
dataView.classList.remove('hidden');
}
else{
perfView.classList.remove('hidden');
dataView.classList.add('hidden');
}

});

initCharts();

</script>

</body>
</html>
